name: RAG CI

'on':
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHONUNBUFFERED: "1"

jobs:
  lint-and-unit:
    name: Lint and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application code
        run: python -m compileall app

      - name: Run unit tests
        run: python -m pytest tests/unit -q

  integration-and-security:
    name: Integration and security tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/integration -q

      - name: Run security tests
        run: python -m pytest tests/security -q

  rag-eval-smoke:
    name: RAG evaluation smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evaluation tests
        run: python -m pytest tests/eval -q

  perf-smoke:
    name: Performance smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run performance smoke tests
        run: python -m pytest tests/perf -q

  release-gate:
    name: Full release gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'
    needs:
      - lint-and-unit
      - integration-and-security
      - rag-eval-smoke
      - perf-smoke
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full test suite
        run: python -m pytest -q


